<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annapurneshwari Garments – Premium Embroidery Works, Mysore</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--gold:#c9a94e;--gold-light:#e8d08a;--gold-dark:#9a7a28;--maroon:#6b1a2e;--maroon-dark:#4a0f1f;--maroon-light:#8b2240;--saffron:#e8720c;--cream:#fdf6ec;--white:#fff;--text-dark:#2c1810;--text-mid:#5a3a2a}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--text-dark);overflow-x:hidden}
    ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--maroon-dark)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}

    /* MARQUEE */
    .mq{background:linear-gradient(90deg,var(--maroon-dark),var(--maroon),var(--maroon-dark));color:var(--gold-light);font-size:.76rem;font-weight:500;letter-spacing:.5px;padding:7px 0;overflow:hidden;white-space:nowrap}
    .mq-inner{display:inline-block;animation:mq 32s linear infinite}
    .mq-inner span{margin:0 30px}.mq-inner .dot{color:var(--saffron)}
    @keyframes mq{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}

    /* NAV */
    nav{position:sticky;top:0;z-index:999;background:rgba(74,15,31,.97);backdrop-filter:blur(10px);border-bottom:2px solid var(--gold-dark);box-shadow:0 2px 20px rgba(0,0,0,.4)}
    .nav-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:62px;gap:12px}
    .nav-logo{font-family:'Cinzel Decorative',serif;font-size:.95rem;color:var(--gold-light);text-decoration:none;letter-spacing:.3px;flex-shrink:0}
    .nav-ul{display:flex;gap:4px;list-style:none;align-items:center}
    .nav-ul a{color:var(--gold-light);text-decoration:none;font-size:.78rem;font-weight:500;padding:6px 12px;border-radius:20px;border:1px solid transparent;transition:all .25s}
    .nav-ul a:hover{background:var(--gold-dark);border-color:var(--gold);color:#fff}
    .nav-cta{background:linear-gradient(135deg,var(--saffron),#b85b08)!important;border-color:var(--saffron)!important;color:#fff!important;font-weight:600!important;box-shadow:0 2px 12px rgba(232,114,12,.4)}
    .nav-cta:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(232,114,12,.6)!important}

    /* LANGUAGE SELECTOR */
    .lang-wrap{position:relative;flex-shrink:0}
    .lang-btn{display:flex;align-items:center;gap:6px;background:rgba(201,169,78,.12);border:1.5px solid rgba(201,169,78,.45);color:var(--gold-light);font-size:.78rem;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .25s;white-space:nowrap;user-select:none}
    .lang-btn:hover{background:rgba(201,169,78,.22);border-color:var(--gold)}
    .lang-btn .arrow{font-size:.6rem;transition:transform .25s}
    .lang-btn .arrow.open{transform:rotate(180deg)}
    .lang-drop{position:absolute;top:calc(100% + 8px);right:0;background:#3a0f1e;border:1.5px solid var(--gold-dark);border-radius:14px;padding:6px;min-width:175px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;animation:dropIn .2s ease}
    @keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .lang-opt{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;cursor:pointer;transition:background .2s;color:var(--gold-light);font-size:.82rem}
    .lang-opt:hover{background:rgba(201,169,78,.15)}
    .lang-opt.active{background:rgba(201,169,78,.2);color:var(--gold);font-weight:600}
    .lang-opt .flag{font-size:1.1rem}
    .lang-opt .name{flex:1}
    .lang-opt .native{font-size:.75rem;color:rgba(253,246,236,.55)}

    /* HERO */
    .hero{background:linear-gradient(135deg,var(--maroon-dark) 0%,#7a1f38 40%,#5a1028 70%,var(--maroon-dark) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:40px 20px}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(201,169,78,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 40%,rgba(232,114,12,.08) 0%,transparent 60%)}
    .hero-pat{position:absolute;inset:0;opacity:.04;background-image:repeating-linear-gradient(45deg,var(--gold) 0,var(--gold) 1px,transparent 0,transparent 50%);background-size:20px 20px}
    .hero-in{position:relative;z-index:2;max-width:1100px;width:100%;display:flex;align-items:center;gap:60px;flex-wrap:wrap;justify-content:center}

    /* GODDESS */
    .gp{display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0}
    .gf{position:relative;width:220px;height:280px}
    .g-ring{position:absolute;inset:-12px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;border:2px dashed rgba(201,169,78,.5);animation:spin 22s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .g-glow{position:absolute;inset:-6px;border-radius:50% 50% 50% 50%/55% 55% 45% 45%;background:radial-gradient(ellipse,rgba(201,169,78,.25) 0%,transparent 70%);animation:pulse 3s ease-in-out infinite alternate}
    @keyframes pulse{0%{opacity:.6;transform:scale(.96)}100%{opacity:1;transform:scale(1.04)}}
    .g-svg{width:220px;height:280px;border-radius:50% 50% 50% 50%/55% 55% 45% 45%;overflow:hidden;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(201,169,78,.2),0 0 40px rgba(201,169,78,.4),0 0 80px rgba(201,169,78,.15);position:relative;z-index:1}
    .g-badge{background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark));color:var(--maroon-dark);font-family:'Cinzel Decorative',serif;font-size:.63rem;font-weight:700;letter-spacing:.8px;padding:6px 14px;border-radius:20px;text-align:center;box-shadow:0 4px 20px rgba(201,169,78,.3);max-width:200px;line-height:1.5}

    /* HERO TEXT */
    .ht{flex:1;min-width:300px;text-align:center}
    .ht-top{font-family:'Cormorant Garamond',serif;font-size:.92rem;color:var(--gold-light);letter-spacing:3px;text-transform:uppercase;opacity:.85;margin-bottom:10px;animation:fu .8s ease both}
    .ht-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,5vw,3rem);font-weight:900;line-height:1.2;color:var(--gold-light);text-shadow:0 2px 20px rgba(201,169,78,.5);animation:fu 1s ease .2s both;margin-bottom:6px}
    .ht-sub{font-family:'Cinzel Decorative',serif;font-size:clamp(1rem,3vw,1.5rem);color:var(--gold);font-weight:400;animation:fu 1s ease .35s both;margin-bottom:16px}
    .ht-div{display:flex;align-items:center;justify-content:center;gap:12px;margin:16px 0;animation:fu 1s ease .45s both}
    .ht-line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
    .ht-dia{width:8px;height:8px;background:var(--gold);transform:rotate(45deg)}
    .ht-desc{font-size:.97rem;color:rgba(253,246,236,.85);line-height:1.7;max-width:480px;margin:0 auto 24px;animation:fu 1s ease .55s both}
    .ht-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:26px;animation:fu 1s ease .65s both}
    .ht-tag{background:rgba(201,169,78,.12);border:1px solid rgba(201,169,78,.4);color:var(--gold-light);font-size:.74rem;padding:6px 13px;border-radius:20px}
    .ht-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fu 1s ease .75s both}
    @keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* BUTTONS */
    .btn-p{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--saffron),#c4620a);color:#fff;font-size:.91rem;font-weight:600;padding:13px 26px;border-radius:40px;text-decoration:none;box-shadow:0 4px 20px rgba(232,114,12,.5);transition:all .3s}
    .btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,114,12,.6)}
    .btn-s{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--gold-light);font-size:.91rem;font-weight:500;padding:13px 26px;border-radius:40px;text-decoration:none;border:1.5px solid var(--gold);transition:all .3s}
    .btn-s:hover{background:rgba(201,169,78,.15);transform:translateY(-2px)}

    /* STATS */
    .stats{background:linear-gradient(135deg,var(--maroon-dark),var(--maroon));padding:34px 20px}
    .stats-in{max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
    .si{text-align:center;flex:1;min-width:140px;padding:10px;border-right:1px solid rgba(201,169,78,.25)}
    .si:last-child{border-right:none}
    .si-n{font-family:'Cinzel Decorative',serif;font-size:2rem;color:var(--gold-light);font-weight:700}
    .si-l{color:rgba(253,246,236,.7);font-size:.78rem;margin-top:4px;letter-spacing:.5px}

    /* SECTION */
    section{padding:78px 20px}
    .sec-in{max-width:1200px;margin:0 auto}
    .sec-hd{text-align:center;margin-bottom:50px}
    .sec-ey{font-size:.74rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--saffron);margin-bottom:10px}
    .sec-ti{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,4vw,2.1rem);color:var(--maroon);font-weight:700;line-height:1.3;margin-bottom:14px}
    .sec-ul{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
    .sul{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold))}
    .sulr{background:linear-gradient(90deg,var(--gold),transparent)}
    .sud{width:6px;height:6px;background:var(--gold);border-radius:50%}
    .sec-de{color:var(--text-mid);font-size:.95rem;max-width:560px;margin:0 auto;line-height:1.7}

    /* SERVICES */
    .srv{background:var(--cream)}
    .srv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}
    .sc{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 22px rgba(107,26,46,.07);border:1px solid rgba(201,169,78,.15);transition:all .35s;position:relative;overflow:hidden}
    .sc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--saffron));transform:scaleX(0);transition:transform .35s}
    .sc:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(107,26,46,.15);border-color:var(--gold)}
    .sc:hover::before{transform:scaleX(1)}
    .sc-ico{font-size:2.8rem;margin-bottom:16px;display:block}
    .sc-nm{font-family:'Cinzel Decorative',serif;font-size:.95rem;color:var(--maroon);font-weight:700;margin-bottom:9px;line-height:1.3}
    .sc-de{color:var(--text-mid);font-size:.84rem;line-height:1.65}

    /* GALLERY */
    .gal{background:linear-gradient(180deg,#fef9f2 0%,#fdf0e0 100%)}
    .gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    @media(max-width:900px){.gal-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.gal-grid{grid-template-columns:1fr}}
    .gc{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 22px rgba(107,26,46,.1);border:1px solid rgba(201,169,78,.2);transition:all .4s cubic-bezier(.25,.8,.25,1);cursor:pointer;position:relative}
    .gc:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 20px 60px rgba(107,26,46,.22);border-color:var(--gold);z-index:10}
    .gc-iw{position:relative;aspect-ratio:4/5;overflow:hidden;background:#f0e8dc}
    .gc-iw img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease;display:block}
    .gc:hover .gc-iw img{transform:scale(1.08)}
    .gc-ov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(74,15,31,.75) 100%);opacity:0;transition:opacity .4s;display:flex;align-items:flex-end;padding:18px}
    .gc:hover .gc-ov{opacity:1}
    .gc-ovt{color:var(--gold-light);font-family:'Cinzel Decorative',serif;font-size:.8rem;font-weight:700}
    .gc-rib{position:absolute;top:13px;right:-8px;background:linear-gradient(135deg,var(--saffron),#b85b08);color:#fff;font-size:.64rem;font-weight:700;letter-spacing:.8px;padding:5px 14px 5px 10px;border-radius:3px 0 0 3px;text-transform:uppercase;box-shadow:-2px 2px 8px rgba(0,0,0,.2);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,0 100%)}
    .gc-inf{padding:16px 18px 18px;border-top:2px solid rgba(201,169,78,.15)}
    .gc-ti{font-family:'Cinzel Decorative',serif;font-size:.82rem;color:var(--maroon);font-weight:700;margin-bottom:4px}
    .gc-su{font-size:.74rem;color:var(--text-mid)}
    .gc-st{color:var(--gold);font-size:.88rem;margin-top:6px;letter-spacing:2px}

    /* LIGHTBOX */
    .lb{position:fixed;inset:0;background:rgba(10,2,6,.95);z-index:9999;display:flex;align-items:center;justify-content:center;animation:lbfade .2s ease}
    @keyframes lbfade{from{opacity:0}to{opacity:1}}
    .lb-in{position:relative;max-width:90vw;max-height:90vh}
    .lb-in img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:12px;border:2px solid var(--gold-dark);box-shadow:0 0 80px rgba(201,169,78,.3)}
    .lb-cl{position:absolute;top:-18px;right:-18px;width:42px;height:42px;border-radius:50%;background:var(--maroon);border:2px solid var(--gold);color:var(--gold-light);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .lb-cl:hover{background:var(--maroon-dark);transform:scale(1.1)}
    .lb-cap{position:absolute;bottom:-42px;left:0;right:0;text-align:center;color:var(--gold-light);font-family:'Cinzel Decorative',serif;font-size:.84rem}

    /* PROCESS */
    .proc{background:#fff}
    .ps{display:flex;gap:0;justify-content:center;flex-wrap:wrap}
    .pst{flex:1;min-width:170px;max-width:210px;text-align:center;padding:26px 16px;position:relative}
    .psn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--maroon),var(--maroon-light));color:var(--gold-light);font-family:'Cinzel Decorative',serif;font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 4px 18px rgba(107,26,46,.3);border:2px solid var(--gold-dark)}
    .pstit{font-weight:600;color:var(--maroon);margin-bottom:7px;font-size:.9rem}
    .psde{font-size:.79rem;color:var(--text-mid);line-height:1.6}
    .psar{position:absolute;right:-18px;top:42px;color:var(--gold);font-size:1.5rem;z-index:1}

    /* CONTACT */
    .con{background:linear-gradient(135deg,var(--maroon-dark) 0%,#6a1830 50%,var(--maroon-dark) 100%);position:relative;overflow:hidden}
    .con::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(201,169,78,.08) 0%,transparent 70%)}
    .con .sec-ti{color:var(--gold-light)}
    .con .sec-ey{color:var(--saffron)}
    .con .sec-de{color:rgba(253,246,236,.75)}
    .cc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:36px}
    .cc{background:rgba(255,255,255,.05);border:1px solid rgba(201,169,78,.3);border-radius:20px;padding:26px 22px;text-align:center;backdrop-filter:blur(10px);transition:all .3s}
    .cc:hover{background:rgba(255,255,255,.09);border-color:var(--gold);transform:translateY(-4px)}
    .cc-ico{font-size:2rem;margin-bottom:12px;display:block}
    .cc-lb{color:rgba(253,246,236,.6);font-size:.74rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
    .cc-vl{color:var(--gold-light);font-size:1rem;font-weight:600;line-height:1.5}
    .cc-vl a{color:inherit;text-decoration:none}.cc-vl a:hover{color:#fff}
    .wa-btn{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;font-size:.97rem;font-weight:600;padding:14px 32px;border-radius:50px;text-decoration:none;box-shadow:0 6px 28px rgba(37,211,102,.4);transition:all .3s}
    .wa-btn:hover{transform:translateY(-3px);box-shadow:0 10px 38px rgba(37,211,102,.5)}

    /* FOOTER */
    footer{background:var(--maroon-dark);border-top:2px solid var(--gold-dark);padding:36px 20px 20px;text-align:center}
    .ft-in{max-width:900px;margin:0 auto}
    .ft-logo{font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--gold-light);margin-bottom:7px}
    .ft-tag{color:rgba(253,246,236,.5);font-size:.81rem;margin-bottom:16px}
    .ft-hr{border:none;border-top:1px solid rgba(201,169,78,.2);margin:16px 0}
    .ft-cp{color:rgba(253,246,236,.4);font-size:.74rem}
    .ft-cp span{color:var(--gold)}

    /* WA FLOAT */
    .waf{position:fixed;bottom:28px;right:28px;z-index:998;width:54px;height:54px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;text-decoration:none;box-shadow:0 4px 18px rgba(37,211,102,.5);transition:transform .2s}
    .waf:hover{transform:scale(1.12)}

    @media(max-width:768px){
      .nav-ul{display:none}
      .hero-in{gap:34px}
      .g-svg,.gf{width:170px;height:220px}
      .si{border-right:none;border-bottom:1px solid rgba(201,169,78,.2)}
      .psar{display:none}
    }
    @media(max-width:480px){.nav-logo{font-size:.78rem}}
  </style>
</head>

/* ── Language Selector ── */
const LangSelector = ({lang, setLang}) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const cur = LANGS.find(l=>l.code===lang);

  useEffect(()=>{
    const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return ()=>document.removeEventListener('mousedown', h);
  },[]);

  return (
    <div className="lang-wrap" ref={ref}>
      <div className="lang-btn" onClick={()=>setOpen(o=>!o)}>
        <span>{cur.flag}</span>
        <span>{cur.native}</span>
        <span className={`arrow${open?' open':''}`}>▼</span>
      </div>
      {open && (
        <div className="lang-drop">
          {LANGS.map(l=>(
            <div key={l.code} className={`lang-opt${lang===l.code?' active':''}`}
                 onClick={()=>{setLang(l.code);setOpen(false)}}>
              <span className="flag">{l.flag}</span>
              <span className="name">{l.name}</span>
              <span className="native">{l.native}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

          {/* Text */}
          <div className="ht">
            <div className="ht-top">{t.heroTop}</div>
            <h1 className="ht-title">{t.heroTitle}</h1>
            <h2 className="ht-sub">{t.heroSub}</h2>
            <div className="ht-div"><div className="ht-line"/><div className="ht-dia"/><div className="ht-line"/></div>
            <p className="ht-desc">{t.heroDesc}</p>
            <div className="ht-tags">{t.heroTags.map((tg,i)=><span key={i} className="ht-tag">{tg}</span>)}</div>
            <div className="ht-btns">
              <a href={WA} className="btn-p" target="_blank" rel="noopener">{t.heroWA}</a>
              <a href="#gallery" className="btn-s">{t.heroView}</a>
            </div>
          </div>
        </div>
      </section>

      {/* Stats */}
      <div className="stats">
        <div className="stats-in">
          {t.stats.map(([n,l],i)=>(
            <div key={i} className="si"><div className="si-n">{n}</div><div className="si-l">{l}</div></div>
          ))}
        </div>
      </div>

      {/* Services */}
      <section className="srv" id="services">
        <div className="sec-in">
          <div className="sec-hd">
            <div className="sec-ey">{t.srvEy}</div>
            <h2 className="sec-ti">{t.srvTi}</h2>
            <div className="sec-ul"><div className="sul"/><div className="sud"/><div className="sul sulr"/></div>
            <p className="sec-de">{t.srvDe}</p>
          </div>
          <div className="srv-grid">
            {t.services.map((s,i)=>(
              <div key={i} className="sc">
                <span className="sc-ico">{s.ico}</span>
                <div className="sc-nm">{s.nm}</div>
                <p className="sc-de">{s.de}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Gallery */}
      <section className="gal" id="gallery">
        <div className="sec-in">
          <div className="sec-hd">
            <div className="sec-ey">{t.galEy}</div>
            <h2 className="sec-ti">{t.galTi}</h2>
            <div className="sec-ul"><div className="sul"/><div className="sud"/><div className="sul sulr"/></div>
            <p className="sec-de">{t.galDe}</p>
          </div>
          <div className="gal-grid">
            {SAMPLE_FILES.map((file,i)=>(
              <div key={i} className="gc" onClick={()=>setLb({file, title:SAMPLES_TITLES[i]})}>
                <div className="gc-iw">
                  <img src={file} alt={SAMPLES_TITLES[i]} loading="lazy"/>
                  <div className="gc-ov"><div className="gc-ovt">🔍 {t.galOv[i]}</div></div>
                  <div className="gc-rib">{t.galRibbons[i]}</div>
                </div>
                <div className="gc-inf">
                  <div className="gc-ti">{SAMPLES_TITLES[i]}</div>
                  <div className="gc-su">{t.galSub[i]}</div>
                  <div className="gc-st">★★★★★</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Process */}
      <section className="proc" id="process">
        <div className="sec-in">
          <div className="sec-hd">
            <div className="sec-ey">{t.procEy}</div>
            <h2 className="sec-ti">{t.procTi}</h2>
            <div className="sec-ul"><div className="sul"/><div className="sud"/><div className="sul sulr"/></div>
            <p className="sec-de">{t.procDe}</p>
          </div>
          <div className="ps">
            {t.steps.map((s,i,arr)=>(
              <div key={i} className="pst">
                <div className="psn">{s.n}</div>
                <div className="pstit">{s.t}</div>
                <div className="psde">{s.d}</div>
                {i<arr.length-1&&<div className="psar">→</div>}
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Contact */}
      <section className="con" id="contact">
        <div className="sec-in" style={{position:"relative",zIndex:1}}>
          <div className="sec-hd">
            <div className="sec-ey">{t.conEy}</div>
            <h2 className="sec-ti">{t.conTi}</h2>
            <div className="sec-ul">
              <div className="sul" style={{background:"linear-gradient(90deg,transparent,#c9a94e)"}}/>
              <div className="sud"/>
              <div className="sul sulr" style={{background:"linear-gradient(90deg,#c9a94e,transparent)"}}/>
            </div>
            <p className="sec-de">{t.conDe}</p>
          </div>
          <div className="cc-grid">
            {t.conCards.map((c,i)=>(
              <div key={i} className="cc">
                <span className="cc-ico">{c.ico}</span>
                <div className="cc-lb">{c.lb}</div>
                <div className="cc-vl">
                  {i===1 ? <a href="tel:+916364002117">{c.vl}</a> : c.vl}
                </div>
              </div>
            ))}
          </div>
          <div style={{textAlign:"center"}}>
            <a href={WA} className="wa-btn" target="_blank" rel="noopener">
              <span style={{fontSize:"1.3rem"}}>💬</span>{t.waBtn}
            </a>
            <p style={{color:"rgba(253,246,236,.45)",fontSize:".76rem",marginTop:"12px"}}>{t.waNote}</p>
          </div>
        </div>
      </section>

      {/* Footer */}
      <footer>
        <div className="ft-in">
          <div className="ft-logo">🧵 Annapurneshwari Garments</div>
          <div className="ft-tag">{t.ftTag}</div>
          <hr className="ft-hr"/>
          <div className="ft-cp">{t.ftCopy} · <span>Anupama Prashanth · 6364002117</span></div>
        </div>
      </footer>

      {/* WhatsApp float */}
      <a href={WA} className="waf" target="_blank" rel="noopener" title="WhatsApp">💬</a>

      {/* Lightbox */}
      {lb && <Lightbox img={lb.file} cap={lb.title} close={()=>setLb(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
