    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #c9954c;
      --deep: #2b1a0e;
      --cream: #fdf6ec;
      --rose: #c0395a;
      --text: #3a2a1a;
      --light: #f9f0e3;

    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; color: var(--text); background: #fff; }

    /* NAV */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 999;
      background: rgba(43,26,14,0.97);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6%; height: 70px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo-circle {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #e8c07a);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 18px; color: var(--deep); font-weight: 700;

    .nav-brand-text { color: #fff; font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.2; }
    .nav-brand-text span { display: block; color: var(--gold); font-size: 0.7rem; font-family: 'Poppins', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { color: #ddd; text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta {
      background: var(--gold); color: var(--deep); padding: 9px 22px;
      border-radius: 25px; text-decoration: none; font-size: 0.82rem; font-weight: 600;
      transition: background 0.2s; letter-spacing: 0.5px;
    }
    .nav-cta:hover { background: #e8c07a; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 24px; height: 2px; background: #fff; border-radius: 2px; }

      background: linear-gradient(135deg, #2b1a0e 0%, #4a2e1a 40%, #6b3a22 70%, #3d2010 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 100px 6% 60px;
    }
    .hero-pattern {
      position: absolute; inset: 0; opacity: 0.06;
      background-image: radial-gradient(circle, #c9954c 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .hero-content { text-align: center; z-index: 1; max-width: 760px; }
    .hero-badge {
      display: inline-block; background: rgba(201,149,76,0.2); border: 1px solid var(--gold);
      color: var(--gold); padding: 6px 20px; border-radius: 30px;
      font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem); color: #fff; line-height: 1.15; margin-bottom: 20px;
    }
    .hero-title .highlight { color: var(--gold); }
    .hero-sub { color: #c9b49a; font-size: 1.05rem; line-height: 1.7; margin-bottom: 40px; max-width: 560px; margin-left: auto; margin-right: auto; }
    .hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {

      padding: 14px 36px; border-radius: 30px; text-decoration: none;
      font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(201,149,76,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,149,76,0.5); }
    .btn-outline {
      border: 2px solid rgba(201,149,76,0.6); color: var(--gold);
      padding: 14px 36px; border-radius: 30px; text-decoration: none;
      font-weight: 500; font-size: 0.9rem; transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(201,149,76,0.1); border-color: var(--gold); }
    .hero-stats {
      display: flex; gap: 40px; justify-content: center; margin-top: 60px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); font-weight: 700; }
    .stat-label { color: #a8927a; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

    /* SECTION COMMONS */
    section { padding: 90px 6%; }
    .section-tag { color: var(--gold); font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3vw, 2.6rem); color: var(--deep); line-height: 1.25; margin-bottom: 16px; }
    .section-sub { color: #7a6050; font-size: 0.95rem; line-height: 1.7; max-width: 560px; }
    .divider { width: 50px; height: 3px; background: linear-gradient(90deg, var(--gold), #e8c07a); border-radius: 2px; margin: 16px 0 32px; }

    /* SERVICES */

    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 28px; margin-top: 50px; }
    .service-card {

      border: 1px solid rgba(201,149,76,0.12);
      box-shadow: 0 2px 16px rgba(43,26,14,0.06);

    .service-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(43,26,14,0.14); }
    .service-icon {

      background: linear-gradient(135deg, #fdf0da, #f5e0b8);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px; font-size: 1.8rem;

    .service-card h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--deep); margin-bottom: 12px; }
    .service-card p { color: #7a6050; font-size: 0.88rem; line-height: 1.65; }
    .service-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; }
    .service-tag { background: rgba(201,149,76,0.1); color: var(--gold); font-size: 0.72rem; padding: 4px 12px; border-radius: 20px; font-weight: 500; }

    /* ABOUT */

    .about-visual {

    .about-visual-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.6rem; margin-bottom: 10px; }
    .about-visual-sub { color: #c9b49a; font-size: 0.9rem; line-height: 1.6; }
    .about-visual::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(201,149,76,0.08) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .about-features { display: flex; flex-direction: column; gap: 22px; margin-top: 32px; }
    .about-feature { display: flex; gap: 16px; align-items: flex-start; }
    .about-feature-icon {
      width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), #e8c07a);
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .about-feature h4 { color: var(--deep); font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .about-feature p { color: #7a6050; font-size: 0.84rem; line-height: 1.5; }

    /* GALLERY */
    #gallery { background: var(--light); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-top: 50px; }
    .gallery-item {
      border-radius: 16px; overflow: hidden; position: relative;
      aspect-ratio: 1; cursor: pointer;
      transition: transform 0.25s;
    }
    .gallery-item:hover { transform: scale(1.03); }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-bg {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
    }
    .gallery-overlay {
      position: absolute; inset: 0; opacity: 0; transition: opacity 0.25s;
      background: rgba(43,26,14,0.7);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
    }
    .gallery-overlay span { color: #fff; font-size: 0.8rem; font-weight: 500; letter-spacing: 1px; }

    /* PROCESS */
    #process { background: var(--deep); }
    #process .section-title { color: #fff; }
    #process .section-sub { color: #a8927a; }
    #process .section-tag { color: var(--gold); }
    #process .divider { background: linear-gradient(90deg, var(--gold), transparent); }
    .process-steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0; margin-top: 50px; position: relative; }
    .process-step { text-align: center; padding: 32px 24px; position: relative; }
    .process-step:not(:last-child)::after {
      content: '→'; position: absolute; right: -10px; top: 38px;
      color: var(--gold); font-size: 1.4rem; opacity: 0.5;
    }
    .step-num {
      width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold);
      margin: 0 auto 18px;
    }
    .process-step h3 { color: #fff; font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
    .process-step p { color: #a8927a; font-size: 0.83rem; line-height: 1.55; }

    /* TESTIMONIALS */
    #testimonials { background: #fff; }
    .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 50px; }
    .testimonial-card {
      background: var(--cream); border-radius: 18px; padding: 32px 28px;
      border: 1px solid rgba(201,149,76,0.15);

    .stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 16px; letter-spacing: 2px; }
    .testimonial-text { color: #5a4030; font-size: 0.9rem; line-height: 1.7; font-style: italic; margin-bottom: 22px; }
    .testimonial-author { display: flex; align-items: center; gap: 12px; }
    .author-avatar {

      font-size: 1.1rem; color: var(--deep); font-weight: 700;

    .author-name { font-weight: 600; color: var(--deep); font-size: 0.88rem; }
    .author-role { color: #9a7a60; font-size: 0.78rem; margin-top: 2px; }

    /* CONTACT */
    #contact { background: var(--cream); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-top: 50px; }
    .contact-info { display: flex; flex-direction: column; gap: 24px; }
    .contact-item { display: flex; gap: 18px; align-items: flex-start; }
    .contact-item-icon {
      width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), #e8c07a);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: var(--deep);
    }
    .contact-item h4 { color: var(--deep); font-weight: 600; margin-bottom: 4px; }
    .contact-item p, .contact-item a { color: #7a6050; font-size: 0.9rem; text-decoration: none; line-height: 1.5; }
    .contact-item a:hover { color: var(--gold); }
    .contact-form { background: #fff; border-radius: 20px; padding: 40px 36px; box-shadow: 0 4px 30px rgba(43,26,14,0.08); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--deep); margin-bottom: 6px; letter-spacing: 0.3px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 16px;
      border: 1.5px solid #e0d0be; border-radius: 10px;
      font-family: 'Poppins', sans-serif; font-size: 0.88rem; color: var(--text);
      background: var(--cream); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .btn-submit {
      width: 100%; background: linear-gradient(135deg, var(--gold), #e8c07a);
      color: var(--deep); padding: 14px; border: none; border-radius: 12px;
      font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,149,76,0.4); }
    .form-success {
      display: none; text-align: center; padding: 20px;
      color: #2d7a4f; font-weight: 600; font-size: 0.9rem;
    }

    /* FOOTER */
    footer { background: var(--deep); padding: 60px 6% 30px; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 50px; margin-bottom: 40px; }
    .footer-brand h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; margin-bottom: 10px; }
    .footer-brand p { color: #a8927a; font-size: 0.85rem; line-height: 1.65; max-width: 300px; }
    .footer-col h4 { color: #fff; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .footer-col ul a { color: #a8927a; text-decoration: none; font-size: 0.84rem; transition: color 0.2s; }
    .footer-col ul a:hover { color: var(--gold); }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: gap; }
    .footer-bottom p { color: #7a6050; font-size: 0.8rem; }
    .footer-bottom .made-with { color: var(--gold); }
    .whatsapp-float {
      position: fixed; bottom: 30px; right: 30px; z-index: 998;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: #fff; text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.5);
      transition: transform 0.2s;
    }
    .whatsapp-float:hover { transform: scale(1.1); }

    /* MOBILE */
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none; }
      .hamburger { display: flex; }
      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 40px; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .form-row { grid-template-columns: 1fr; }
      .process-step:not(:last-child)::after { display: none; }
      .hero-stats { gap: 24px; }
    }
    @media (max-width: 480px) {
      section { padding: 70px 5%; }
      nav { padding: 0 5%; }
    }
  </style>
</head>
